<!DOCTYPE html>
<html>
<head>
    <title>Mini Mario Game 🎮</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            overflow: hidden;
            font-family: Arial;
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: cyan;
            top: 300px;
            left: 50px;
            border-radius: 6px;
        }

        .platform {
            position: absolute;
            background: #374151;
            height: 20px;
        }

        .enemy {
            position: absolute;
            width: 30px;
            height: 30px;
            background: red;
            top: 300px;
            border-radius: 50%;
        }

        .goal {
            position: absolute;
            width: 40px;
            height: 40px;
            background: gold;
            top: 100px;
            left: 700px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<div id="game">

    <div id="player"></div>

    <!-- plateformes -->
    <div class="platform" style="top: 340px; left: 0; width: 200px;"></div>
    <div class="platform" style="top: 280px; left: 200px; width: 200px;"></div>
    <div class="platform" style="top: 220px; left: 400px; width: 200px;"></div>
    <div class="platform" style="top: 160px; left: 600px; width: 200px;"></div>

    <!-- ennemis -->
    <div class="enemy" id="enemy1" style="left: 250px;"></div>
    <div class="enemy" id="enemy2" style="left: 500px;"></div>

    <!-- objectif -->
    <div class="goal"></div>

</div>

<script>

let player = document.getElementById("player");

let x = 50;
let y = 300;
let vy = 0;
let gravity = 1;
let jumping = false;

// ennemis
let enemy1 = document.getElementById("enemy1");
let enemy2 = document.getElementById("enemy2");

let e1x = 250;
let e2x = 500;
let dir1 = 1;
let dir2 = -1;

// contrôle joueur
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowRight"){
        x += 10;
    }
    if(e.key === "ArrowLeft"){
        x -= 10;
    }
    if(e.key === "ArrowUp" && !jumping){
        vy = -15;
        jumping = true;
    }
});

function update(){

    // gravité
    vy += gravity;
    y += vy;

    if(y > 300){
        y = 300;
        vy = 0;
        jumping = false;
    }

    // ennemis bougent
    e1x += dir1 * 3;
    e2x += dir2 * 2;

    if(e1x > 350 || e1x < 200) dir1 *= -1;
    if(e2x > 650 || e2x < 450) dir2 *= -1;

    enemy1.style.left = e1x + "px";
    enemy2.style.left = e2x + "px";

    // position joueur
    player.style.left = x + "px";
    player.style.top = y + "px";

    // collision ennemis
    if(
        (Math.abs(x - e1x) < 30 && Math.abs(y - 300) < 40) ||
        (Math.abs(x - e2x) < 30 && Math.abs(y - 300) < 40)
    ){
        alert("💀 Game Over !");
        x = 50;
        y = 300;
    }

    // victoire
    if(x > 680 && y < 150){
        alert("🏆 Bravo ! Niveau terminé !");
        x = 50;
        y = 300;
    }

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
